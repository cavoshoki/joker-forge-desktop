name: Nightly Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release-main
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Nightly Metadata
    runs-on: ubuntu-latest
    outputs:
      nightly_version: ${{ steps.meta.outputs.nightly_version }}
      nightly_tag: ${{ steps.meta.outputs.nightly_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute nightly version and release notes
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION=$(node -p "require('./app-version.json').version")
          DATE_STAMP=$(date +"%Y%m%d")
          NIGHTLY_VERSION="${BASE_VERSION}-nightly.${DATE_STAMP}.${GITHUB_RUN_NUMBER}"
          NIGHTLY_TAG="nightly-${NIGHTLY_VERSION}"
          RELEASE_NAME="Nightly ${NIGHTLY_VERSION}"

          LAST_NIGHTLY_TAG=$(git tag --list 'nightly-*' --sort=-creatordate | head -n 1 || true)

          {
            echo "## Nightly Build"
            echo
            echo "- Version: ${NIGHTLY_VERSION}"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Trigger: push"
            echo
            echo "## Commits Since Previous Nightly"
            echo
            if [ -n "${LAST_NIGHTLY_TAG}" ]; then
              echo "Previous nightly tag: ${LAST_NIGHTLY_TAG}"
              echo
              git log "${LAST_NIGHTLY_TAG}..HEAD" --pretty=format:'- %s (%h) by %an'
            else
              echo "No previous nightly tag found. Showing recent commits:"
              echo
              git log -n 30 --pretty=format:'- %s (%h) by %an'
            fi
          } > release-notes.md

          {
            echo "nightly_version=${NIGHTLY_VERSION}"
            echo "nightly_tag=${NIGHTLY_TAG}"
            echo "release_name=${RELEASE_NAME}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-release-notes
          path: release-notes.md

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            bundle_args: --bundles nsis
            artifact_glob: src-tauri/target/release/bundle/nsis/*.exe
          - platform: linux
            os: ubuntu-latest
            bundle_args: --bundles appimage,deb
            artifact_glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync app version
        run: npm run version:sync

      - name: Prepare nightly app identity and version
        run: node scripts/prepare-release-channel.cjs --channel nightly --version "${{ needs.prepare.outputs.nightly_version }}"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri bundle
        run: npx tauri build ${{ matrix.bundle_args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-bundles-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}

  publish:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: nightly-release-notes
          path: .

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-bundles-*
          merge-multiple: true
          path: release-assets

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.nightly_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          body_path: release-notes.md
          prerelease: true
          target_commitish: ${{ github.sha }}
          files: release-assets/**

  cleanup:
    name: Cleanup Old Nightlies
    runs-on: ubuntu-latest
    needs:
      - publish

    steps:
      - name: Delete nightly releases beyond retention limit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t OLD_TAGS < <(
            gh release list --limit 200 --json tagName,isPrerelease,publishedAt --jq '
              map(select(.isPrerelease == true and (.tagName | startswith("nightly-"))))
              | sort_by(.publishedAt)
              | reverse
              | .[14:]
              | .[].tagName
            '
          )

          if [ "${#OLD_TAGS[@]}" -eq 0 ]; then
            echo "No old nightly releases to delete."
            exit 0
          fi

          for tag in "${OLD_TAGS[@]}"; do
            echo "Deleting old nightly release and tag: ${tag}"
            gh release delete "${tag}" --yes --cleanup-tag
          done
